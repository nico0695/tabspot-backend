services:
  postgres:
    image: postgres:16-alpine
    container_name: tabspot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tabspot
      POSTGRES_PASSWORD: tabspot
      POSTGRES_DB: tabspot
    ports:
      - '5432:5432'
    volumes:
      - tabspot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tabspot -d tabspot']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres-test:
    image: postgres:16-alpine
    container_name: tabspot-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: tabspot
      POSTGRES_PASSWORD: tabspot
      POSTGRES_DB: tabspot_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tabspot -d tabspot_test']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  tabspot_pg_data:
